# This file is automatically synchronized from https://github.com/Glatzel/template

name: cargo bench
description: Run Rust benchmarks with CodSpeed

inputs:
  working-directory:
    description: Working directory
    default: .
  options:
    description: Options passed to cargo fuzz test
    required: false
    default: --all-features

runs:
  using: composite
  steps:
    - name: Install cargo-codspeed
      run: pixi global install -c https://prefix.dev/glatzel cargo-codspeed
      shell: pwsh
    - name: Build benchmark targets
      run: |
        if (Test-Path ./scripts/setup.ps1) { . ./scripts/setup.ps1 }
        cargo codspeed build ${{ inputs.options }}
      working-directory: ${{ inputs.working-directory }}
      shell: pwsh

    - name: Run benchmarks
      uses: CodSpeedHQ/action@f99becdce5e5d51fd556489ebef684f4ecfd6286 # v4.18.5
      with:
        run: cargo codspeed run
        mode: simulation
        working-directory: ${{ inputs.working-directory }}
