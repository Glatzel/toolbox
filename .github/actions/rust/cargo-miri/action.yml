# This File is automatically synchronized from https://github.com/Glatzel/template

name: cargo miri
description: cargo miri

inputs:
  working-directory:
    description: "working-directory"
    default: .
  args:
    description: "args"
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - shell: pwsh
      working-directory: ${{ inputs.working-directory }}
      run: |
        $ErrorActionPreference = "Stop"
        $PSNativeCommandUseErrorActionPreference = $true
        if (Test-Path ./scripts/setup.ps1) { . ./scripts/setup.ps1 }
        cargo +nightly miri test ${{inputs.miri-args}}
