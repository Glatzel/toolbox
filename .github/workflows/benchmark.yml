name: benchmark

on:
  workflow_dispatch:
  workflow_call:

jobs:
  cargo-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/rust/setup-rust
      - uses: ./.github/actions/rust/cargo-bench
        with:
          working-directory: ./rust
          options: -p rax -p rax-nmea --all-features
