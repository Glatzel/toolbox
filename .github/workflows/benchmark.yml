name: benchmark

on:
  workflow_dispatch:
  workflow_call:

jobs:
  cargo-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust/setup-rust
      - uses: ./.github/actions/rust/cargo-bench
        with:
          working-directory: ./rust
          args: -p rax -p rax-nmea --all-features
