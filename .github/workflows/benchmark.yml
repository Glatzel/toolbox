name: benchmark

on:
  workflow_dispatch:
  workflow_call:

jobs:
  cargo-bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust/setup-rust
      - uses: ./.github/actions/rust/cargo-bench
        with:
          working-directory: ./rust
          args: -p rax -p rax-nmea --all-features
