name: Lefthook

on:
  workflow_dispatch:
  workflow_call:
  issue_comment:
    types: [created]
# permissions:
#   contents: write
#   pull-requests: write
jobs:
  lefthook:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook')) }}
    runs-on: ubuntu-latest
    steps:
      - id: get-branch
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        run: echo "branch=$(gh pr view "$PR_NO" --repo "$REPO" --json headRefName --jq '.headRefName')" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}
          PR_NO: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) && steps.get-branch.outputs.branch || github.head_ref }}

      # - name: comment if triggered by comment
      #   id: comment
      #   if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
      #   run: |
      #     url=$(gh pr comment "${{ github.event.issue.number }}" --body "Lefthook is running.")
      #     echo "comment_url=${url}" >> "$GITHUB_OUTPUT"
      #   env:
      #     GH_TOKEN: ${{ github.token }}

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ./lefthook/.pixi
          key: lefthook-${{ hashFiles('lefthook.yaml','./lefthook/pixi*')}}
          restore-keys: |
            lefthook

      #  pixi setup
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
        with:
          run-install: false

      # pre-commit
      - name: lefthook
        run: |
          pixi run --manifest-path ./lefthook/pixi.toml lefthook-run

          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "❌ Lefthook modified files. Please run lefthook locally and commit the fixes."
            git --no-pager diff
            exit 1
          fi
      - uses: pre-commit-ci/lite-action@5d6cc0eb514c891a40562a58a8e71576c5c7fb43 # v1.1.0
        if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook') && !cancelled() }}

