# This File is automatically synchronized from https://github.com/Glatzel/template

name: Lefthook

on:
  workflow_dispatch:
  workflow_call:
  issue_comment:
    types: [created]
permissions:
  contents: write
  pull-requests: write
jobs:
  lefthook:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request' || (github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook')) }}
    runs-on: ubuntu-latest
    steps:
      - id: get-branch
        if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
        run: echo "branch=$(gh pr view "$PR_NO" --repo "$REPO" --json headRefName --jq '.headRefName')" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}
          PR_NO: ${{ github.event.issue.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Checkout PR branch
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) && steps.get-branch.outputs.branch || github.head_ref }}
      - parallel:
        - name: comment if triggered by comment
          if: github.event_name == 'issue_comment' && github.event.issue.pull_request != null
          run: |
            url=$(gh pr comment "${{ github.event.issue.number }}" --body "Lefthook is running 🚀")
            echo "comment_url=${url}" >> "$GITHUB_OUTPUT"
          env:
            GH_TOKEN: ${{ github.token }}
        - name: Set up pixi
          uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
          with:
            run-install: false
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ./.github/actions/lefthook/.pixi
          key: lefthook-${{ hashFiles('lefthook.yaml','./.github/actions/lefthook/pixi*')}}
          restore-keys: |
            lefthook
      # pre-commit
      - name: lefthook
        run: pixi run --manifest-path ./.github/actions/lefthook/pixi.toml lefthook-run
      - if: ${{!cancelled()}}
        run: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "❌ Lefthook modified files. Please run lefthook locally and commit the fixes."
            git --no-pager diff
            exit 1
          fi
      - name: Auto commit fixes
        if: ${{ github.event_name == 'issue_comment' && github.event.issue.pull_request != null && contains(github.event.comment.body, 'lefthook') && !cancelled() }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          COMMENT_BODY=""

          if ! git diff --cached --quiet; then
            if git commit -m "apply lefthook fixes"; then
              if git push; then
                COMMENT_BODY="**Lefthook finished**
          ✅ Fixes applied and pushed successfully."
              else
                COMMENT_BODY="**Lefthook finished**
          ⚠️ Fixes committed locally, but **push failed**."
              fi
            else
              COMMENT_BODY="**Lefthook finished**
          ❌ Failed to commit fixes."
            fi
          else
            COMMENT_BODY="**Lefthook finished**
          ✅️ No changes were required."
          fi

          # Always attempt to comment
          gh pr comment "${GITHUB_EVENT_ISSUE_NUMBER}" --edit-last --body "${COMMENT_BODY}" || echo "Failed to comment on PR"
        env:
          GH_TOKEN: ${{ github.token }}
