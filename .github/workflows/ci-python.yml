name: python-CI

on:
  workflow_dispatch:
  workflow_call:
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@5185adfbffb4bd703da3010310260805d89ebb11 # v0.9.6
        with:
          run-install: false
      - uses: ./.github/actions/python/pytest
        with:
          working-directory: ./python
        env:
          PYTHONPATH: ./src
      - uses: ./.github/actions/common/codecov
        if: ${{!cancelled()}}
