name: python-CI

on:
  workflow_dispatch:
  workflow_call:
jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - parallel:
        - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        - name: Set up pixi
          uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
          with:
            run-install: false
      - uses: ./.github/actions/python/pytest
        with:
          working-directory: ./python
        env:
          PYTHONPATH: ./src
      - uses: ./.github/actions/common/codecov
        if: ${{!cancelled()}}
