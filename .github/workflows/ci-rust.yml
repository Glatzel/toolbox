name: rust-CI

on:
  workflow_dispatch:
  workflow_call:
defaults:
  run:
    working-directory: ./rust
env:
  WORKDIR: ./rust
jobs:
  cargo-test:
    strategy:
      fail-fast: false
      matrix:
        args:
          - --workspace --all-features --exclude clerk
          - -p mischief --no-default-features --features macros
          - --features tracing -p clerk
          - --no-default-features -p rax -p rax-nmea
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust/setup-rust
        with:
          toolchain: nightly
          components: clippy
      - uses: ./.github/actions/rust/cargo-clippy
        with:
          working-directory: ${{env.WORKDIR}}
          args: ${{matrix.args}} -- -D warnings
      - uses: ./.github/actions/rust/cargo-test
        with:
          working-directory: ${{env.WORKDIR}}
          global-args: ${{matrix.args}}
      - uses: ./.github/actions/common/codecov
        if: ${{!cancelled()}}

  cargo-miri:
    strategy:
      fail-fast: false
      matrix:
        machine: [ubuntu-latest]
    runs-on: ${{matrix.machine}}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust/setup-rust
        with:
          toolchain: nightly
          components: "miri"
      - uses: ./.github/actions/rust/cargo-miri
        with:
          working-directory: ${{env.WORKDIR}}
          args: -p envoy
  cargo-doc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        args:
          - --workspace --all-features --exclude clerk --no-deps
          - --features tracing -p clerk --no-deps
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/rust/setup-rust
      - uses: ./.github/actions/rust/cargo-doc
        with:
          working-directory: ${{env.WORKDIR}}
          args: ${{matrix.args}}
