name: rust-CI

on:
  workflow_dispatch:
  workflow_call:
permissions: read-all
defaults:
  run:
    working-directory: ./rust
env:
  WORKDIR: ./rust
jobs:
  cargo-test:
    strategy:
      fail-fast: false
      matrix:
        args:
          - --workspace --all-features --exclude clerk
          - -p mischief --no-default-features --features macros
          - --features tracing -p clerk
          - --no-default-features -p rax -p rax-nmea
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - name: Set up pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          run-install: false
      - uses: ./.github/actions/rust/cargo-clippy
        with:
          working-directory: ${{env.WORKDIR}}
          args: ${{matrix.args}}
      - uses: ./.github/actions/rust/cargo-test
        with:
          working-directory: ${{env.WORKDIR}}
          args: ${{matrix.args}}

  cargo-miri:
    strategy:
      fail-fast: false
      matrix:
        machine: [ubuntu-latest]
    runs-on: ${{matrix.machine}}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: "miri"
      - uses: ./.github/actions/rust/cargo-miri
        with:
          working-directory: ${{env.WORKDIR}}
  cargo-doc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        args:
          - --workspace --all-features --exclude clerk
          - --features tracing -p clerk
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/rust/cargo-test
        with:
          working-directory: ${{env.WORKDIR}}
          args: ${{matrix.args}}
