name: fuzz
on:
  workflow_dispatch:
  workflow_call:
jobs:
  fuzz:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz-rax, fuzz-rax-nmea]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust/setup-rust
        with:
          toolchain: nightly
          components: llvm-tools-preview
      - uses: ./.github/actions/rust/cargo-fuzz
        with:
          working-directory: ./rust-fuzz
          target: ${{matrix.target}}
      - uses: ./.github/actions/common/codecov
        if: ${{!cancelled()}}
        with:
          flags: fuzz
