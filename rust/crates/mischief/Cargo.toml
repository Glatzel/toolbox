[package]
edition.workspace = true
name = "mischief"
version.workspace = true

[dependencies]
arbor.workspace = true
mischief-macros = { workspace = true, optional = true }
owo-colors = { workspace = true, optional = true }
supports-color = { workspace = true, optional = true }
supports-hyperlinks = { workspace = true, optional = true }
supports-unicode = { workspace = true, optional = true }
terminal_size = { workspace = true, optional = true }

[dev-dependencies]
insta = { workspace = true, features = ["filters"] }

[features]
default = ["fancy", "arbor/default", "macros"]
fancy = [
  "owo-colors",
  "supports-color",
  "supports-hyperlinks",
  "supports-unicode",
  "terminal_size",
]
macros = ["mischief-macros"]
textwrap = ["arbor/textwrap"]
textwrap-hyphenation = ["arbor/textwrap-hyphenation"]
textwrap-smawk = ["arbor/textwrap-smawk"]
textwrap-unicode-linebreak = ["arbor/textwrap-unicode-linebreak"]
textwrap-unicode-width = ["arbor/textwrap-unicode-width"]
