[package]
edition = "2024"
name = "orc"
version = "2026.3.17"

[dependencies]
arbor = { path = "../../rust/crates/arbor" }
clerk = { path = "../../rust/crates/clerk", features = "tracing" }
mischief = { path = "../../rust/crates/mischief" }

clap = { version = "4.6.0", features = ["derive"] }
clap-verbosity-flag = "3.0.4"
