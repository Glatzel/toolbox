goblin = "0.10.5"
hashbrown = "0.16.0"
owo-colors = "4.2.2"
path-slash = "0.2.1"
strum = { version = "0.28", features = ["derive"] }
terminal_size = "0.4.3"
thiserror = { version = "2.0.16" }
