[package]
name = "shook"
version = "2026.4.7"
edition = "2024"

[dependencies]
clerk = { path = "../../rust/crates/clerk", features = ["tracing"] }
kioyu = { path = "../../rust/crates/kioyu" }
mischief = { path = "../../rust/crates/mischief" }

axum = "0.8.8"
clap = { version = "4.6.0", features = ["derive"] }
clap-verbosity-flag = { version="3.0.4", features = ["tracing"]}
hashbrown = { version = "0.16.1", features = ["serde"] }
hex = "0.4.3"
hmac = "0.13.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.11.0"
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }
toml = "1.0"
validator = { version = "0.20.0", features = ["derive"] }
async-trait = "0.1.89"
microsandbox = "0.3.12"

[dev-dependencies]
insta = { version = "1.46.1", features = ["filters", "json"] }
rstest = "0.26.1"
tempfile = "3.27.0"
tower = "0.5.3"

[profile.dev.package]
insta.opt-level = 3
similar.opt-level = 3
