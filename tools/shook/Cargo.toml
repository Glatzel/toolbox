[package]
edition = "2024"
name = "shook"
version = "2026.4.3"

[dependencies]
clerk = { path = "../../rust/crates/clerk", features = ["tracing"] }
mischief = { path = "../../rust/crates/mischief" }

axum = "0.8.8"
clap = { version = "4.6.0", features = ["derive"] }
clap-verbosity-flag = "3.0.4"
hex = "0.4.3"
hmac = "0.13.0"
reqwest = { version = "0.13.0", features = ["json"] }
reqwest-middleware = "0.5.0"
reqwest-retry = "0.9.0"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.145"
sha2 = "0.11.0"
strum = { version = "0.28", features = ["derive"] }
tokio = { version = "1.48.0", features = ["rt-multi-thread"] }
toml = "1.0"
validator = { version = "0.20.0", features = ["derive"] }

[dev-dependencies]
insta = { version = "1.46.1", features = ["filters"] }
rstest = "0.26.1"

[profile.dev.package]
insta.opt-level = 3
similar.opt-level = 3

[features]
test-mode = []

[profile.release]
codegen-units = 1
debug = false
lto = "fat"
opt-level = 3
strip = true
